##
## .github/workflows/daily-digest.yml
## @author Paul Fleury <hello@paulfleury.com>
## @version 3.4.2
##
## Cup of News — Digest Generation for ALL 9 Language Editions
##
## WHAT THIS DOES:
##   Runs TWICE per day at 6:00 AM GMT and 4:00 PM GMT.
##   Generates and auto-publishes one digest per language edition (9 total).
##   Each edition uses its own native-language RSS source pool and writes in
##   the target language via Gemini 2.5 Pro.
##
## HOW IT WORKS (v3.4.2+):
##   Uses the two-step job API to avoid HTTP proxy timeouts:
##
##   Step 1 — POST /api/digest/start-job { pin, edition }
##     Returns immediately (~50ms) with { jobId }.
##     The server starts the pipeline asynchronously.
##
##   Step 2 — GET /api/digest/job/:id/status
##     Polled every 10 seconds until status = "done" or "error".
##     The pipeline takes 60-250 seconds depending on Jina + OpenRouter load.
##     We poll for up to 6 minutes (36 attempts × 10s) before giving up.
##
##   Why not the old POST /api/digest/generate endpoint:
##     That endpoint held the HTTP connection open for the full pipeline duration.
##     Fly.io's proxy has a 75s idle timeout — it drops the connection and returns
##     502/504 before the pipeline finishes. The job system avoids this entirely
##     by returning immediately and streaming progress via SSE or polling.
##
## WHY TWICE A DAY (v3.2.1):
##   6:00 AM GMT — Morning edition: overnight + early news cycle.
##   4:00 PM GMT — Afternoon edition: midday developments, markets close,
##                 major press conferences typically land before this window.
##
## WHY 9 EDITIONS (v3.1.0+):
##   en, fr, de, es, pt, zh, ru, tr, it — 1 edition = 1 language.
##
## REQUIRED SECRETS (Settings → Secrets → Actions):
##   ESPRESSO_URL        — https://app.cupof.news
##   ESPRESSO_ADMIN_KEY  — admin password (used for the x-admin-key header)
##
## REQUIRED VARIABLES (Settings → Variables → Actions):
##   AUTO_PUBLISH=true   — already set; controls auto-publish after generation
##
## DIGEST PIN:
##   The job API uses the digest PIN (default: 123456) not the admin key.
##   PIN is set via admin panel → "Digest Generation PIN" card.
##   Default PIN is 123456. If you change it, update DIGEST_PIN secret.
##   Falls back to 123456 if DIGEST_PIN secret not set.
##

name: Digest Generation — All 9 Editions (6 AM + 4 PM GMT)

on:
  schedule:
    # 6:00 AM GMT — morning edition
    - cron: '0 6 * * *'
    # 4:00 PM GMT — afternoon edition
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      edition:
        description: 'Generate specific edition only (leave empty for all 9)'
        required: false
        default: ''
      force:
        description: 'Force regeneration (unpublish existing first)'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # Run editions sequentially to avoid overwhelming the server
      # and to respect OpenRouter rate limits (Gemini 2.5 Pro)
      max-parallel: 1
      matrix:
        edition:
          - en
          - fr
          - de
          - es
          - pt
          - zh
          - ru
          - tr
          - it

    steps:
      - name: Skip if specific edition requested and this is not it
        if: ${{ github.event.inputs.edition != '' && github.event.inputs.edition != matrix.edition }}
        run: echo "Skipping ${{ matrix.edition }} — only generating ${{ github.event.inputs.edition }}"

      - name: Generate digest — ${{ matrix.edition }}
        if: ${{ github.event.inputs.edition == '' || github.event.inputs.edition == matrix.edition }}
        env:
          APP_URL: ${{ secrets.ESPRESSO_URL }}
          DIGEST_PIN: ${{ secrets.DIGEST_PIN || '123456' }}
          EDITION: ${{ matrix.edition }}
        run: |
          echo "🌍 Generating edition: $EDITION"
          echo "⏰ Trigger time: $(date -u '+%Y-%m-%d %H:%M UTC')"

          # ── Step 1: Start the job ────────────────────────────────────────────
          # Returns immediately with { jobId }. The server runs the pipeline async.
          echo "📤 Starting job for $EDITION..."
          START_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${APP_URL}/api/digest/start-job" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            -d "{\"pin\": \"${DIGEST_PIN}\", \"edition\": \"${EDITION}\"}")

          START_HTTP=$(echo "$START_RESPONSE" | tail -1)
          START_BODY=$(echo "$START_RESPONSE" | head -1)

          echo "Start HTTP: $START_HTTP"
          echo "Start body: $START_BODY"

          if [ "$START_HTTP" != "200" ]; then
            echo "❌ Failed to start job for $EDITION (HTTP $START_HTTP)"
            exit 1
          fi

          # Extract jobId from JSON response
          JOB_ID=$(echo "$START_BODY" | python3 -c "
          import sys, json
          try:
              d = json.loads(sys.stdin.read())
              print(d.get('jobId', ''))
          except Exception as e:
              print('')
          ")

          if [ -z "$JOB_ID" ]; then
            echo "❌ No jobId in response: $START_BODY"
            exit 1
          fi

          echo "✅ Job started: $JOB_ID"

          # ── Step 2: Poll for completion ──────────────────────────────────────
          # Poll /api/digest/job/:id/status every 10s for up to 6 min (36 attempts)
          # Pipeline typically takes 60-250s. We give it 360s max.
          MAX_ATTEMPTS=36
          ATTEMPT=0
          FINAL_STATUS=""

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            ELAPSED=$((ATTEMPT * 10))

            sleep 10

            STATUS_RESPONSE=$(curl -s "${APP_URL}/api/digest/job/${JOB_ID}/status" --max-time 15 2>/dev/null)
            STATUS=$(echo "$STATUS_RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.loads(sys.stdin.read())
              print(d.get('status', 'unknown'))
          except:
              print('error')
          ")

            echo "  [$ELAPSED s] Status: $STATUS"

            if [ "$STATUS" = "done" ]; then
              STORY_COUNT=$(echo "$STATUS_RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.loads(sys.stdin.read())
              print(d.get('storiesCount', '?'))
          except:
              print('?')
          ")
              echo "✅ $EDITION digest done — $STORY_COUNT stories (${ELAPSED}s)"
              FINAL_STATUS="done"
              break
            fi

            if [ "$STATUS" = "error" ]; then
              ERROR_MSG=$(echo "$STATUS_RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.loads(sys.stdin.read())
              print(d.get('error', 'unknown error'))
          except:
              print('unknown error')
          ")
              echo "❌ $EDITION job failed: $ERROR_MSG"
              FINAL_STATUS="error"
              break
            fi

            # "running" or "pending" — keep polling
          done

          if [ "$FINAL_STATUS" != "done" ]; then
            if [ -z "$FINAL_STATUS" ]; then
              echo "❌ Timed out after ${MAX_ATTEMPTS} polling attempts (${ELAPSED}s) for $EDITION"
            fi
            exit 1
          fi
